<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>個人履歷</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="left">
    <img src="images/photo.jpg" alt="個人照片" class="profile">

    <h2 id="name">你的名字</h2>
    <p id="title">學生 / 應徵者</p>

    <div class="section">
      <h3>聯絡資訊</h3>
      <p>Email: example@gmail.com</p>
      <p>Phone: 0912-345-678</p>
    </div>

    <div class="section">
      <h3>技能</h3>
      <ul id="skills">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
      </ul>
    </div>
  </div>

  <div class="right">
    <div class="section">
      <h3>自我介紹</h3>
      <p id="about">
        我是一個認真努力的人，對學習新事物充滿熱情，希望未來能在相關領域發展。
      </p>
    </div>

    <div class="section">
      <h3>學歷</h3>
      <p>XXX 高中</p>
    </div>

    <div class="section">
      <h3>經歷</h3>
      <p>目前無工作經驗（可以自己改）</p>
    </div>

    <button onclick="changeText()">點我改自我介紹</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
